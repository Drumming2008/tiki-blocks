<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'">
    <title>Tiki Blocks</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <canvas></canvas>
    <div id="debug"></div>
    <img id="crosshair" src="./assets/ui/crosshair.png" draggable="false">
    <div id="hud">
      <ui-div id="hotbar"></ui-div>
    </div>
    <div id="pause-menu">
      <button id="resume">
        Back to Game
      </button>
      <button id="open-settings">
        Settings
      </button>
      <button>
        Save and Quit
      </button>
    </div>
    <div id="settings" class="hidden">
      <section id="left">
        <button id="close-settings">< Back</button>
        <ui-slider min="30" value="80" max="200">FOV</ui-slider>
      </section>
      <section id="right">
        <button>Whener</button>
        <button>Tener</button>
        <button>Hunt</button>
      </section>
    </div>
    <script src="./gl-matrix.js"></script>
    <script src="./utils.js"></script>
    <script src="./script.js"></script>
    <script src="./webgl.js"></script>
    <script src="./world/block_data.js"></script>
    <script src="./world/blocks.js"></script>
    <script src="./world/chunks.js"></script>
    <script src="./ui.js"></script>
  </body>
</html>
