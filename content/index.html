<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Tiki FishRipple™</title>
    <style>
      html, body, #wrapper {
        max-height: 100vh;
        min-height: unset;
        overflow: hidden;
      }

      main {
        overflow: hidden;
      }

      #canvas-wrapper {
        position: absolute;
        inset: 0;
        background: white;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 2s linear;
      }
    </style>
  </head>
  <body class="light-theme">
    <div id="wrapper">
      <main>
        <div id="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>
      </main>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
